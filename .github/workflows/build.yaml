name: Build Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore tournament-dupr-ratings.slnx

      - name: Build
        run: dotnet build tournament-dupr-ratings.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test tournament-dupr-ratings.Tests/TournamentDuprRatings.Tests.csproj --configuration Release --no-build
